name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  public-self-check:
    name: Public self check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run public repository self check
        run: python .\tests\公开仓库自检.py

      - name: Parse Python entrypoints
        shell: powershell
        run: |
          @'
          import ast
          from pathlib import Path
          for name in ["app.py", "modern_app.py", "tests/公开仓库自检.py", "tests/冒烟测试.py"]:
              ast.parse(Path(name).read_text(encoding="utf-8"), filename=name)
              print("[OK]", name)
          '@ | python -
