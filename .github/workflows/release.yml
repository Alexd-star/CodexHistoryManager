name: Release Windows EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run public repository self check
        run: python .\tests\公开仓库自检.py

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build executable
        shell: powershell
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name "CodexHistoryManager" `
            --icon "assets\codex_history_manager.ico" `
            --collect-all customtkinter `
            --collect-all darkdetect `
            --add-data "static;static" `
            --add-data "assets;assets" `
            --add-data "README.md;." `
            --add-data "VERSION;." `
            modern_app.py

      - name: Build installer
        shell: powershell
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = (Get-Command iscc -ErrorAction Stop).Source
          }
          & $iscc "/DAppVersion=$version" "installer\CodexHistoryManager.iss"

      - name: Test installer
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\installer_smoke_test.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexHistoryManager-Windows
          path: |
            dist/CodexHistoryManager.exe
            dist/CodexHistoryManager-Setup-*.exe

      - name: Create GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $setup = Get-ChildItem "dist\CodexHistoryManager-Setup-*.exe" | Select-Object -First 1
          if (-not $setup) {
            throw "Installer asset was not found."
          }
          gh release create "${{ github.ref_name }}" `
            "dist\CodexHistoryManager.exe" `
            "$($setup.FullName)" `
            --title "${{ github.ref_name }}" `
            --generate-notes
